{% load static %}
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debata - System Obsługi</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="topbar">
        <div class="event-title" id="event-title">Debata Szkolna 2026</div>
        <div class="clock" id="clock">11:21</div>
    </div>
    <div id="app">
        <div class="debate-list-container">
            <div class="debate-header">
                <div class="debate-topic" id="debate-topic">Temat debaty</div>
                <div class="debate-question" id="debate-question">Pytanie debaty</div>
            </div>
            <div class="speakers-section">
                <div class="current-speaker" id="current-speaker">
                    <span class="mic">🎤</span>
                    <span class="name">Imię Nazwisko</span>
                </div>
                <div class="timer-display" id="timer-display">05:00</div>
                <ol class="speakers-list" id="speakers-list">
                    <li>Uczeń 1 (klasa)</li>
                    <li>Uczeń 2 (klasa)</li>
                    <li>Uczeń 3 (klasa)</li>
                </ol>
            </div>
        </div>
    </div>
    <script src="{% static 'js/app.js' %}"></script>
</body>
</html>
