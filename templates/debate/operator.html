{% load static %}
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel operatora debaty</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="operator-layout">
        <aside class="sidebar">
            <div class="sidebar-logo">Debata</div>
            <nav class="sidebar-nav">
                <a href="#" class="active">Lista mówców</a>
                <a href="#">Tematy</a>
                <a href="#">Uczestnicy</a>
                <a href="#">Ustawienia</a>
            </nav>
        </aside>
        <main class="operator-main">
            <div class="operator-topbar">
                <span class="operator-title">Panel operatora</span>
                <span class="operator-user">Operator</span>
            </div>
            <section class="operator-content">
                <h2 class="operator-section-title">Ustawienia debaty</h2>

                <form id="debate-config-form" class="debate-config-form">
                    <label>
                        Tytuł debaty
                        <input type="text" id="event-title-input" required>
                    </label>
                    <label>
                        Temat
                        <input type="text" id="topic-input" required>
                    </label>
                    <label>
                        Pytanie
                        <input type="text" id="question-input" required>
                    </label>
                    <label>
                        Domyślny czas mowy (sekundy)
                        <input type="number" id="default-seconds-input" min="1" required>
                    </label>
                    <div class="debate-config-switches">
                        <label><input type="checkbox" id="sound-warning-input"> Sygnał ostrzegawczy (-15s)</label>
                        <label><input type="checkbox" id="sound-end-input"> Sygnał końca (0s)</label>
                        <label><input type="checkbox" id="sound-muted-input"> Wycisz wszystko (mute)</label>
                    </div>
                    <button type="submit">Zapisz ustawienia</button>
                </form>

                <div class="operator-timer-panel">
                    <div class="operator-timer-title">Timer: <span id="operator-timer-display">05:00</span></div>
                    <div class="operator-timer-actions">
                        <button type="button" id="timer-toggle">Start</button>
                        <button type="button" id="timer-reset">Reset</button>
                        <button type="button" id="timer-minus">-15 s</button>
                        <button type="button" id="timer-plus">+15 s</button>
                    </div>
                </div>

                <h2 class="operator-section-title" id="operator-topic">TOP 4 · Debata szkolna</h2>
                <div class="operator-current-speaker" id="operator-current-speaker">
                    <span class="mic">🎤</span>
                    <span class="name" id="operator-current-name">Brak mówcy</span>
                    <span class="operator-actions">
                        <button type="button" title="Gwiazdka" id="toggle-star">★</button>
                        <button type="button" title="Ostrzeżenie" style="color:#e67c1f;" id="toggle-warn">⚠</button>
                    </span>
                </div>
                <form id="add-speaker-form" class="add-speaker-form">
                    <input type="text" id="add-speaker-input" placeholder="Imię i klasa uczestnika" required>
                    <button type="submit">Dodaj</button>
                </form>
                <ol class="operator-speakers-list" id="operator-speakers-list"></ol>
            </section>
        </main>
    </div>
    <script src="{% static 'js/operator.js' %}"></script>
</body>
</html>
